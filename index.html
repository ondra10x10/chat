<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="chat-container">
    <div id="header">DARKNET CHAT TERMINAL</div>
    <div id="username-section">
      <input id="username-input" placeholder="Enter username" />
      <button id="set-username-btn">SET</button>
    </div>
    <div id="messages"></div>
    <form id="form" action="">
      <input id="input" autocomplete="off" placeholder="Enter message" /><button>SEND</button>
    </form>
  </div>
  <script src="script.js"></script>
</body>
</html>
