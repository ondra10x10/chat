<!DOCTYPE html>
<html>
<head>
    <title>Multi-User Chat</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #chat { border: 1px solid #ccc; height: 300px; overflow-y: scroll; }
        #messages { margin: 0; padding: 10px; }
        #sendArea { display: flex; }
        #username { margin-right: 10px; }
    </style>
</head>
<body>
    <h1>Multi-User Chat</h1>
    <div>
        <input type="text" id="username" placeholder="Enter your username" />
    </div>
    <div id="chat">
        <ul id="messages"></ul>
    </div>
    <div id="sendArea">
        <input type="text" id="messageInput" placeholder="Type a message..." />
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        function sendMessage() {
            const username = document.getElementById('username').value;
            const messageInput = document.getElementById('messageInput');

            if (username && messageInput.value) {
                const li = document.createElement('li');
                li.textContent = username + ': ' + messageInput.value;
                document.getElementById('messages').appendChild(li);
                messageInput.value = '';
                document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
            } else {
                alert('Please enter a username and a message.');
            }
        }
    </script>
</body>
</html>
