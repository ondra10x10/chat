<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Chatting Website</title>

<style>
body {
    font-family: 'Courier New', Courier, monospace;
    background-color: #f0f0f0;
    color: #333;
    text-align: center;
}

.chat-container {
    width: 80%;
    margin: auto;
    background: #fff;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.chat-box {
    border: 1px solid #ccc;
    height: 300px;
    overflow-y: scroll;
    padding: 10px;
    background: #e8e8e8;
    margin-bottom: 10px;
    text-align: left;
}

.input-row {
    margin-bottom: 10px;
}

.username-input {
    padding: 8px;
    width: 200px;
    border: 1px solid #ccc;
    border-radius: 4px;
}

.message-input {
    width: 65%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
}

.send-button {
    padding: 10px 15px;
    border: none;
    border-radius: 4px;
    background-color: #28a745;
    color: white;
    cursor: pointer;
}

.send-button:hover {
    background-color: #218838;
}
</style>
</head>

<body>

<div class="chat-container">
    <h1>Retro Chat Room</h1>

    <div class="input-row">
        <input type="text" id="username" class="username-input" placeholder="Enter username">
    </div>

    <div class="chat-box" id="chat-box"></div>

    <input type="text" id="message-input" class="message-input" placeholder="Type your message...">
    <button id="send-button" class="send-button">Send</button>
</div>

<script>

const chatBox = document.getElementById('chat-box');
const messageInput = document.getElementById('message-input');
const usernameInput = document.getElementById('username');
const sendButton = document.getElementById('send-button');

function sendMessage(){

    const username = usernameInput.value.trim();
    const message = messageInput.value.trim();

    if(!username || !message){
        alert("Please enter a username and a message.");
        return;
    }

    const messageElement = document.createElement('div');
    messageElement.textContent = username + ": " + message;

    chatBox.appendChild(messageElement);

    messageInput.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;
}

sendButton.addEventListener("click", sendMessage);

messageInput.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        sendMessage();
    }
});

</script>

</body>
</html>
